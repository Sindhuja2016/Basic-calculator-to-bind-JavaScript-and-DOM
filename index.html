<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator">
    <input type="text" placeholder="0" id="display">
    <div class="buttons">
    <div class="first row">
    <button class="key per">%</button>
    <button class="key ce">CE</button>
    <button class="key c">C</button>
    <button class="key del">⌫</button>
    </div>

    <div class="second row">
    <button class="key divbyx">1/x</button>
    <button class="key square">x²</button>
    <button class="key squareroot">&#8730;</button>
    <button class="key div">÷</button>
    </div>

    <div class="third row">
    <button class="key btn7">7</button>
    <button class="key btn8">8</button>
    <button class="key btn9">9</button>
    <button class="key mul">×</button>
    </div>

    <div class="fourth row">
    <button class="key btn4">4</button>
    <button class="key btn5">5</button>
    <button class="key btn6">6</button>
    <button class="key minus">-</button>
    </div>
    
    <div class="fifth row">
    <button class="key btn1">1</button>
    <button class="key btn2">2</button>
    <button class="key btn3">3</button>
    <button class="key add">+</button>
    </div>
    <div class="sixth row">
     <button class="key btn00">00</button>
     <button class="key btn0">0</button>
     <button class="key point">.</button>
     <button class="key equal">=</button>
    </div>
  </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
